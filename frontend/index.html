<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenMind – Smart Greenhouse Dashboard</title>
  <meta name="description" content="Monitor and control your smart greenhouse in real-time. Live sensor data, device control, and automated schedules." />
  <meta name="theme-color" content="#06090f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ═══════════════════════ AUTH SCREEN ═══════════════════════ -->
<div id="auth-screen" class="screen auth-screen active" role="main">
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="auth-orb orb-3"></div>
    <div class="auth-orb orb-4"></div>
    <div class="auth-orb orb-5"></div>
  </div>
  <div class="auth-card glass-strong">
    <div class="auth-logo">
      <span class="logo-icon" aria-hidden="true">🌿</span>
      <span class="logo-text">GreenMind</span>
    </div>
    <p class="auth-tagline">Smart Greenhouse Control Platform</p>

    <!-- Tab switcher -->
    <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
      <button type="button" id="tab-login" class="auth-tab active" role="tab" aria-selected="true" onclick="switchTab('login')">Sign In</button>
      <button type="button" id="tab-register" class="auth-tab" role="tab" aria-selected="false" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)" novalidate>
      <div class="field-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="your_username" required autocomplete="username" />
      </div>
      <div class="field-group">
        <label for="login-password">Password</label>
        <div class="password-field">
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="password-toggle" data-target="login-password" aria-label="Show password" aria-pressed="false">👁</button>
        </div>
      </div>
      <div id="login-error" class="form-error hidden" role="alert"></div>
      <button type="submit" id="login-btn" class="btn-primary full-width">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader hidden" aria-hidden="true">⟳</span>
      </button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)" novalidate>
      <div class="field-row">
        <div class="field-group">
          <label for="reg-first">First Name</label>
          <input type="text" id="reg-first" placeholder="John" autocomplete="given-name" />
        </div>
        <div class="field-group">
          <label for="reg-last">Last Name</label>
          <input type="text" id="reg-last" placeholder="Doe" autocomplete="family-name" />
        </div>
      </div>
      <div class="field-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="farmer_john" required autocomplete="username" />
      </div>
      <div class="field-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="john@farm.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="reg-phone">Phone (optional)</label>
        <input type="tel" id="reg-phone" placeholder="+959123456789" autocomplete="tel" />
      </div>
      <div class="field-group">
        <label for="reg-password">Password</label>
        <div class="password-field">
          <input type="password" id="reg-password" placeholder="••••••••" required autocomplete="new-password" />
          <button type="button" class="password-toggle" data-target="reg-password" aria-label="Show password" aria-pressed="false">👁</button>
        </div>
      </div>
      <div class="field-group">
        <label for="reg-password2">Confirm Password</label>
        <div class="password-field">
          <input type="password" id="reg-password2" placeholder="••••••••" required autocomplete="new-password" />
          <button type="button" class="password-toggle" data-target="reg-password2" aria-label="Show password" aria-pressed="false">👁</button>
        </div>
      </div>
      <div id="register-error" class="form-error hidden" role="alert"></div>
      <button type="submit" id="register-btn" class="btn-primary full-width">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden" aria-hidden="true">⟳</span>
      </button>
    </form>
  </div>
</div>

<!-- ═══════════════════════ MAIN APP ═══════════════════════ -->
<div id="app-screen" class="screen app-screen hidden" role="application">

  <!-- ══════ SIDEBAR ══════ -->
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo">
      <span class="logo-icon" aria-hidden="true">🌿</span>
      <span class="logo-text">GreenMind</span>
    </div>

    <nav class="sidebar-nav" aria-label="Main menu">
      <div class="nav-section-label">Main</div>
      <button id="nav-overview" class="nav-item active" onclick="navigateTo('overview')" aria-current="page" title="Overview (1)">
        <span class="nav-icon" aria-hidden="true">📊</span>
        <span class="nav-label">Overview</span>
      </button>
      <button id="nav-sensors" class="nav-item" onclick="navigateTo('sensors')" title="Sensor Data (2)">
        <span class="nav-icon" aria-hidden="true">📡</span>
        <span class="nav-label">Sensor Data</span>
      </button>
      <button id="nav-analytics" class="nav-item" onclick="navigateTo('analytics')" title="Analytics (3)">
        <span class="nav-icon" aria-hidden="true">📈</span>
        <span class="nav-label">Analytics</span>
      </button>

      <div class="nav-section-label" style="margin-top:6px;">Control</div>
      <button id="nav-control" class="nav-item" onclick="navigateTo('control')" title="Device Control (4)">
        <span class="nav-icon" aria-hidden="true">🎛️</span>
        <span class="nav-label">Device Control</span>
      </button>
      <button id="nav-schedules" class="nav-item" onclick="navigateTo('schedules')" title="Schedules (5)">
        <span class="nav-icon" aria-hidden="true">🗓️</span>
        <span class="nav-label">Schedules</span>
      </button>

      <div class="nav-section-label" style="margin-top:6px;">Manage</div>
      <button id="nav-greenhouses" class="nav-item" onclick="navigateTo('greenhouses')" title="Greenhouses (6)">
        <span class="nav-icon" aria-hidden="true">🏡</span>
        <span class="nav-label">Greenhouses</span>
      </button>
      <button id="nav-profile" class="nav-item" onclick="navigateTo('profile')" title="Profile (7)">
        <span class="nav-icon" aria-hidden="true">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-badge" id="user-badge">
        <div class="user-avatar-wrap" id="user-avatar">?</div>
        <div class="user-info">
          <span class="user-name" id="sidebar-username">—</span>
          <span class="user-role" id="sidebar-role">Farmer</span>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn-secondary" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" style="font-size:.85rem;">🌙 Theme</button>
        <button class="btn-logout" id="logout-btn" onclick="handleLogout()" title="Sign out">
          <span>⏻</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- ══════ MAIN CONTENT ══════ -->
  <main class="main-content" id="main-content">

    <!-- Top Bar -->
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="openMobileSidebar()" aria-label="Open menu" aria-expanded="false">☰</button>
        <h1 class="page-title" id="page-title">Overview</h1>
      </div>
      <div class="topbar-right">
        <div class="gh-selector-wrap">
          <span class="gh-selector-icon" aria-hidden="true">🏡</span>
          <select id="gh-select" class="gh-select-input" onchange="handleGhChange()" aria-label="Select greenhouse">
            <option value="">Select Greenhouse…</option>
          </select>
        </div>
        <button class="btn-secondary btn-icon-topbar" id="refresh-btn" onclick="refreshData()" title="Refresh data (R)" aria-label="Refresh data">↻</button>
        <span class="last-sync hidden" id="last-sync" aria-live="polite"></span>
        <div class="connection-pill" title="API connection status">
          <span class="status-dot offline" id="connection-status" aria-label="Offline"></span>
          <span class="connection-label" id="connection-label">Offline</span>
        </div>
      </div>
    </header>

    <!-- Page fragment placeholders — populated by loadPageFragments() -->
    <section id="page-overview"    class="page hidden"></section>
    <section id="page-sensors"     class="page hidden"></section>
    <section id="page-control"     class="page hidden"></section>
    <section id="page-schedules"   class="page hidden"></section>
    <section id="page-analytics"   class="page hidden"></section>
    <section id="page-profile"     class="page hidden"></section>

    <!-- Greenhouses page (rendered purely by JS, no fragment file needed) -->
    <section id="page-greenhouses" class="page hidden" aria-label="Greenhouses">
      <div class="schedules-header">
        <div class="page-section-header">
          <h2>My Greenhouses</h2>
          <p>Manage your registered greenhouse devices</p>
        </div>
        <button class="btn-primary" onclick="openAddGhModal()" aria-label="Add new greenhouse">
          <span>＋</span> Add Greenhouse
        </button>
      </div>
      <div id="greenhouses-grid" role="list" aria-label="Greenhouses list"></div>
    </section>
  </main>


  <!-- Mobile drawer backdrop -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<!-- ═══════════════════════ GREENHOUSE MODAL ═══════════════════════ -->
<div id="gh-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="gh-modal-title">
  <div class="modal-card">
    <div class="modal-header">
      <h2 class="modal-title" id="gh-modal-title">Add Greenhouse</h2>
      <button class="modal-close" onclick="closeGhModal()" aria-label="Close modal">✕</button>
    </div>
    <form id="gh-form" onsubmit="handleAddGh(event)" novalidate>
      <div class="field-group">
        <label for="gh-name">Greenhouse Name</label>
        <input type="text" id="gh-name" placeholder="e.g. Main Greenhouse" required />
      </div>
      <div class="field-group">
        <label for="gh-serial">Serial Number</label>
        <input type="text" id="gh-serial" placeholder="e.g. GH-001-XYZ" required />
      </div>
      <div id="gh-modal-error" class="form-error hidden" role="alert"></div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeGhModal()">Cancel</button>
        <button type="submit" id="gh-submit-btn" class="btn-primary">
          <span class="btn-text">Add Greenhouse</span>
          <span class="btn-loader hidden" aria-hidden="true">⟳</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ═══════════════════════ SCHEDULE MODAL ═══════════════════════ -->
<div id="schedule-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="sched-modal-title">
  <div class="modal-card" id="schedule-modal-card">
    <div class="modal-header">
      <h2 class="modal-title" id="sched-modal-title">New Automation Schedule</h2>
      <button class="modal-close" onclick="closeScheduleModal()" aria-label="Close schedule modal">✕</button>
    </div>
    <form id="schedule-form" onsubmit="handleCreateSchedule(event)" novalidate>
      <div class="field-group">
        <label for="sched-device">Device</label>
        <select id="sched-device" onchange="toggleFanTarget()" required aria-label="Select device">
          <option value="fan">Fan</option>
          <option value="pump">Water Pump</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div id="sched-fan-target-fields" class="field-group">
        <label for="sched-fan-target">Fan Target</label>
        <select id="sched-fan-target" aria-label="Select fan target">
          <option value="all">All Fan Sets</option>
          <option value="set1">Fan Set 1 Only</option>
          <option value="set2">Fan Set 2 Only</option>
        </select>
      </div>
      <div class="field-group">
        <label for="sched-action">Action</label>
        <select id="sched-action" required aria-label="Select action">
          <option value="on">Turn ON</option>
          <option value="off">Turn OFF</option>
        </select>
      </div>
      <div class="field-group">
        <label for="sched-condition">Trigger Type</label>
        <select id="sched-condition" onchange="toggleScheduleCondition()" required aria-label="Select trigger type">
          <option value="time">Time-based</option>
          <option value="sensor">Sensor threshold</option>
        </select>
      </div>
      <div id="sched-time-fields" class="field-group">
        <label for="sched-time">Time of Day</label>
        <input type="time" id="sched-time" />
      </div>
      <div id="sched-sensor-fields" class="hidden">
        <div class="field-group">
          <label for="sched-sensor-name">Sensor</label>
          <select id="sched-sensor-name" aria-label="Select sensor">
            <option value="temperature">Temperature (°C)</option>
            <option value="humidity">Humidity (%)</option>
            <option value="soil_moisture">Soil Moisture (%)</option>
            <option value="light_intensity">Light (lx)</option>
            <option value="battery_voltage">Battery (V)</option>
          </select>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label for="sched-operator">Operator</label>
            <select id="sched-operator" aria-label="Select operator">
              <option value="gt">Greater than (&gt;)</option>
              <option value="lt">Less than (&lt;)</option>
              <option value="gte">≥</option>
              <option value="lte">≤</option>
            </select>
          </div>
          <div class="field-group">
            <label for="sched-threshold">Threshold</label>
            <input type="number" id="sched-threshold" placeholder="e.g. 30" step="0.1" />
          </div>
        </div>
      </div>
      <div id="schedule-modal-error" class="form-error hidden" role="alert"></div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeScheduleModal()">Cancel</button>
        <button type="submit" class="btn-primary">
          <span class="btn-text">Create Schedule</span>
          <span class="btn-loader hidden" aria-hidden="true">⟳</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ═══════════════════════ SCHEDULE DETAILS MODAL ═══════════════════════ -->
<div id="schedule-details-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="schedule-details-title">
  <div class="modal-card schedule-details-card">
    <div class="modal-header">
      <h2 class="modal-title" id="schedule-details-title">Schedule Details</h2>
      <button class="modal-close" onclick="closeScheduleDetails()" aria-label="Close details modal">✕</button>
    </div>
    <div id="schedule-details-body" class="schedule-details-body"></div>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" onclick="closeScheduleDetails()">Close</button>
    </div>
  </div>
</div>

<!-- Toast notifications -->
<div id="toast-container" role="region" aria-live="assertive" aria-atomic="true"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
