<!-- PAGE: Profile -->
<section id="page-profile" class="page hidden" aria-label="Profile settings" data-page-fragment="ready">
  <div style="max-width:760px;">
    <div class="page-section-header">
      <h2>Profile &amp; Settings</h2>
      <p>Manage your account information</p>
    </div>

    <div class="profile-grid">
      <div class="profile-card" style="grid-column: 1 / -1;">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-large" id="profile-avatar-large">?</div>
          <div class="profile-user-info">
            <div class="user-name-large" id="profile-name-display">—</div>
            <div class="user-since" id="profile-email-display" style="color:var(--clr-text3);margin-top:3px;">—</div>
            <div id="profile-role-badge" style="margin-top:8px;display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.22);border-radius:20px;font-size:.75rem;font-weight:700;color:var(--clr-green);">🌿 Farmer</div>
          </div>
        </div>

        <form id="profile-form" onsubmit="handleProfileUpdate(event)" novalidate>
          <div style="display:flex;flex-direction:column;gap:14px;">
            <div class="field-row">
              <div class="field-group">
                <label for="profile-first">First Name</label>
                <input type="text" id="profile-first" placeholder="John" autocomplete="given-name" />
              </div>
              <div class="field-group">
                <label for="profile-last">Last Name</label>
                <input type="text" id="profile-last" placeholder="Doe" autocomplete="family-name" />
              </div>
            </div>
            <div class="field-group">
              <label for="profile-email">Email</label>
              <input type="email" id="profile-email" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="field-group">
              <label for="profile-phone">Phone</label>
              <input type="tel" id="profile-phone" placeholder="+959123456789" autocomplete="tel" />
            </div>
            <div id="profile-error" class="form-error hidden" role="alert"></div>
            <div id="profile-success" class="ctrl-feedback success hidden" role="status">✅ Profile updated successfully!</div>
            <div style="display:flex;justify-content:flex-end;">
              <button type="submit" id="profile-save-btn" class="btn-primary" style="min-width:140px;">
                <span class="btn-text">Save Changes</span>
                <span class="btn-loader hidden" aria-hidden="true">⟳</span>
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="profile-card">
        <div class="card-title">
          <span class="card-title-icon">📊</span>
          Account Stats
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--clr-surface2);border-radius:var(--radius-sm);border:1px solid var(--clr-border);">
            <span style="font-size:.83rem;color:var(--clr-text3);">🏡 Greenhouses</span>
            <strong id="profile-gh-count" style="font-family:'Outfit',sans-serif;font-size:1.1rem;">—</strong>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--clr-surface2);border-radius:var(--radius-sm);border:1px solid var(--clr-border);">
            <span style="font-size:.83rem;color:var(--clr-text3);">📡 Total Readings</span>
            <strong id="profile-reading-count" style="font-family:'Outfit',sans-serif;font-size:1.1rem;">—</strong>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--clr-surface2);border-radius:var(--radius-sm);border:1px solid var(--clr-border);">
            <span style="font-size:.83rem;color:var(--clr-text3);">🗓️ Schedules</span>
            <strong id="profile-sched-count" style="font-family:'Outfit',sans-serif;font-size:1.1rem;">—</strong>
          </div>
        </div>
      </div>

      <div class="profile-card">
        <div class="card-title">
          <span class="card-title-icon">⚙️</span>
          App Settings
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--clr-surface2);border-radius:var(--radius-sm);border:1px solid var(--clr-border);">
            <div>
              <div style="font-size:.85rem;font-weight:600;margin-bottom:2px;">Dark Mode</div>
              <div style="font-size:.75rem;color:var(--clr-text3);">Toggle app theme</div>
            </div>
            <button class="btn-secondary" onclick="toggleTheme()" id="settings-theme-btn" style="font-size:.82rem;padding:7px 14px;">🌙 Toggle</button>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--clr-surface2);border-radius:var(--radius-sm);border:1px solid var(--clr-border);">
            <div>
              <div style="font-size:.85rem;font-weight:600;margin-bottom:2px;">Auto-Refresh</div>
              <div style="font-size:.75rem;color:var(--clr-text3);">Updates every 15 seconds</div>
            </div>
            <span style="font-size:.78rem;color:var(--clr-green);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.22);padding:4px 10px;border-radius:20px;font-weight:700;">ON</span>
          </div>
          <div style="padding:12px 14px;background:var(--clr-surface2);border-radius:var(--radius-sm);border:1px solid var(--clr-border);">
            <div style="font-size:.85rem;font-weight:600;margin-bottom:6px;">API Base URL</div>
            <div style="display:flex;gap:8px;">
              <input type="url" id="api-base-input" placeholder="Auto (same host as this page)" style="flex:1;padding:8px 12px;background:var(--input-bg);border:1px solid var(--clr-border2);border-radius:var(--radius-sm);color:var(--clr-text);font-size:.82rem;font-family:inherit;outline:none;" />
              <button class="btn-secondary" onclick="applyApiBase()" style="padding:8px 14px;font-size:.82rem;">Apply</button>
            </div>
            <small class="field-hint" style="margin-top:5px;display:block;">Current: <span id="current-api-base" style="font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--clr-green);">—</span></small>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
