<!-- PAGE: Sensors -->
<section id="page-sensors" class="page hidden" aria-label="Sensor data" data-page-fragment="ready">
  <div class="sensor-history-header">
    <div class="sensor-history-controls">
      <div class="field-group inline">
        <label for="sensor-limit">Show last</label>
        <select id="sensor-limit" onchange="loadSensorHistory()" class="compact-select" aria-label="Number of sensor readings">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
          <option value="500">500</option>
        </select>
        <label>readings</label>
      </div>
    </div>
    <button class="btn-secondary" onclick="loadSensorHistory()" aria-label="Refresh sensor data">↻ Refresh</button>
  </div>
  <div class="sensor-table-wrap card glass">
    <table class="sensor-table" id="sensor-table" aria-label="Sensor readings">
      <thead>
        <tr>
          <th scope="col">⏰ Timestamp</th>
          <th scope="col">🌡️ Temp (°C)</th>
          <th scope="col">💧 Humidity (%)</th>
          <th scope="col">🪴 Soil (%)</th>
          <th scope="col">☀️ Light (lx)</th>
          <th scope="col">🔋 Battery (V)</th>
        </tr>
      </thead>
      <tbody id="sensor-tbody">
        <tr><td colspan="6" class="table-empty">Select a greenhouse to load data</td></tr>
      </tbody>
    </table>
  </div>
</section>
