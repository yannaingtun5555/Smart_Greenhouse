<!-- PAGE: Schedules -->
<section id="page-schedules" class="page hidden" aria-label="Schedules" data-page-fragment="ready">
  <div class="schedules-header">
    <div class="page-section-header">
      <h2>Automation Rules</h2>
      <p>Auto-trigger devices by time or sensor threshold</p>
    </div>
    <button class="btn-primary" onclick="openScheduleModal()" aria-label="Add new schedule">
      <span>＋</span> New Schedule
    </button>
  </div>
  <div class="schedules-list" id="schedules-list" aria-live="polite">
    <div class="card glass table-empty">Select a greenhouse to view schedules</div>
  </div>

  <div id="schedule-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="sched-modal-title" onclick="closeScheduleModal(event)">
    <div class="modal-card" id="schedule-modal-card"></div>
  </div>

  <div id="schedule-details-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="schedule-details-title" onclick="closeScheduleDetails(event)">
    <div class="modal-card schedule-details-card">
      <div class="modal-header">
        <h2 class="modal-title" id="schedule-details-title">Schedule Details</h2>
        <button class="modal-close" onclick="closeScheduleDetails()" aria-label="Close details modal">✕</button>
      </div>
      <div id="schedule-details-body" class="schedule-details-body"></div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeScheduleDetails()">Close</button>
      </div>
    </div>
  </div>
</section>
