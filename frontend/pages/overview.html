<!-- PAGE: Overview -->
<section id="page-overview" class="page" aria-label="Overview" data-page-fragment="ready">
  <div class="overview-stats-bar" id="overview-stats-bar"></div>
  <div class="sensor-grid" id="overview-sensor-grid" aria-live="polite"></div>
  <div class="overview-bottom">
    <div class="card glass device-state-card" id="device-state-card">
      <div class="card-title">
        <span class="card-title-icon" aria-hidden="true">🎛️</span>
        Device Status
      </div>
      <div class="device-indicators" id="device-indicators">
        <div class="device-indicator" id="ind-fan-set1" role="status" aria-label="Fan Set 1 status">
          <span class="device-icon" aria-hidden="true">💨</span>
          <span class="device-label">Fan Set 1</span>
          <span class="device-badge badge-off">OFF</span>
        </div>
        <div class="device-indicator" id="ind-fan-set2" role="status" aria-label="Fan Set 2 status">
          <span class="device-icon" aria-hidden="true">💨</span>
          <span class="device-label">Fan Set 2</span>
          <span class="device-badge badge-off">OFF</span>
        </div>
        <div class="device-indicator" id="ind-pump" role="status" aria-label="Water pump status">
          <span class="device-icon" aria-hidden="true">💧</span>
          <span class="device-label">Pump</span>
          <span class="device-badge badge-off">OFF</span>
        </div>
        <div class="device-indicator" id="ind-light" role="status" aria-label="Light status">
          <span class="device-icon" aria-hidden="true">💡</span>
          <span class="device-label">Light</span>
          <span class="device-badge badge-off">OFF</span>
        </div>
        <div class="device-indicator" id="ind-energy" role="status" aria-label="Energy mode">
          <span class="device-icon" aria-hidden="true">⚡</span>
          <span class="device-label">Energy</span>
          <span class="device-badge badge-off">—</span>
        </div>
      </div>
    </div>
    <div class="card glass activity-card">
      <div class="card-title">
        <span class="card-title-icon" aria-hidden="true">📋</span>
        Recent Activity
      </div>
      <ul class="activity-list" id="activity-list" aria-live="polite" aria-label="Activity log">
        <li class="activity-item muted">
          <span class="activity-msg">No activity yet…</span>
        </li>
      </ul>
    </div>
  </div>
</section>
