services:
  # ───────────────────────────────────────────────────────────────────────
  # Web service: Django API + served static frontend + in-process MQTT
  # subscriber (runs inside the gunicorn process so no paid background worker
  # is needed on the free plan).
  # ───────────────────────────────────────────────────────────────────────
  - type: web
    name: smart-greenhouse-backend
    env: python
    plan: free
    rootDir: server/dashboard
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    # Run migrations, then gunicorn with a SINGLE worker. One worker matters:
    # the in-process MQTT subscriber must be a singleton to avoid duplicate
    # sensor inserts, and 1 worker also fits the free plan's 512 MB RAM.
    startCommand: python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://smart-greenhouse-backend.onrender.com
      # ── Database (auto-injected by the Postgres resource below) ──
      - key: DATABASE_URL
        fromDatabase:
          name: greenhouse-db
          property: connectionString
      # ── MQTT: in-process subscriber + Django command publishing ──
      # Toggle the in-process MQTT worker on. Local Docker keeps using the
      # standalone mqtt_worker.py service, so there are no duplicate subs.
      - key: MQTT_WORKER_IN_PROCESS
        value: "true"
      - key: MQTT_ENABLED
        value: "true"
      # Cloud MQTT broker. SET THESE IN THE RENDER DASHBOARD (or edit here):
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_USE_TLS
        value: "false"
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_KEEPALIVE
        value: "60"

  # ───────────────────────────────────────────────────────────────────────
  # Free PostgreSQL. NOTE: Render's free Postgres expires 90 days after
  # creation — back up data before then, or upgrade to a paid instance.
  # The web service reads DATABASE_URL from this resource above.
  # ───────────────────────────────────────────────────────────────────────
  - type: psql
    name: greenhouse-db
    plan: free
    ipAllowList: []  # allow connections from Render services only
