services:
  - type: web
    name: smart-greenhouse-backend
    env: python
    plan: free
    rootDir: server/dashboard
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://smart-greenhouse-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: greenhouse-db
          property: connectionString
      - key: MQTT_WORKER_IN_PROCESS
        value: "true"
      - key: MQTT_ENABLED
        value: "true"
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_USE_TLS
        value: "false"
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_KEEPALIVE
        value: "60"
      - key: SERVER_SCHEDULE_DISPATCH
        value: "false"
  - type: psql
    name: greenhouse-db
    plan: free
    ipAllowList: []
