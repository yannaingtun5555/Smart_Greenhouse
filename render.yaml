services:
  - type: web
    name: smart-greenhouse-backend
    env: python
    plan: free
    rootDir: server/dashboard
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate --noinput
      gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      
      - key: RENDER
        value: "true"
      
      - key: DEBUG
        value: "false"
      
      - key: ALLOWED_HOSTS
        value: ".onrender.com,smart-greenhouse-backend.onrender.com"
      
      - key: SECRET_KEY
        generateValue: true
      
      - key: CORS_ALLOWED_ORIGINS
        value: "https://smart-greenhouse-backend.onrender.com,https://smart-greenhouse-frontend.onrender.com"
      
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://smart-greenhouse-backend.onrender.com,https://smart-greenhouse-frontend.onrender.com"
      
      - key: DATABASE_URL
        fromDatabase:
          name: greenhouse-db
          property: connectionString
      
      # MQTT Configuration
      - key: MQTT_WORKER_IN_PROCESS
        value: "true"
      
      - key: MQTT_ENABLED
        value: "true"
      
      - key: MQTT_BROKER
        value: "your-broker-url.hivemq.cloud"  # ← REPLACE with your broker URL
        sync: false
      
      - key: MQTT_PORT
        value: "1883"  # Use 8883 for TLS
      
      - key: MQTT_USE_TLS
        value: "false"  # Set to "true" if using port 8883
      
      - key: MQTT_USERNAME
        value: "yan9htun"  # ← REPLACE with your username
        sync: false
      
      - key: MQTT_PASSWORD
        value: "yan9htun"  # ← REPLACE with your password
        sync: false
      
      - key: MQTT_KEEPALIVE
        value: "60"
      
      - key: MQTT_CLIENT_ID_PREFIX
        value: "render-backend"
      
      - key: SERVER_SCHEDULE_DISPATCH
        value: "false"
      
      # Optional: Django performance settings
      - key: CONN_MAX_AGE
        value: "600"
      
      - key: DISABLE_COLLECTSTATIC
        value: "0"
      
      # Optional: Sentry for error tracking (if you have it)
      # - key: SENTRY_DSN
      #   sync: false
  - type: static
    name: smart-greenhouse-frontend
    plan: free
    rootDir: frontend
    buildCommand: sh build-render.sh
    staticPublishPath: dist
    envVars:
      - key: RENDER_API_BASE
        value: https://smart-greenhouse-backend.onrender.com

databases:
  - type: psql
    name: greenhouse-db
    plan: free
    ipAllowList: []  # Only Render internal access
    databaseName: greenhouse
    user: greenhouse_user
    # Uncomment if you want to specify a different database/user
    # database: greenhouse
    # user: greenhouse_user
