services:
  - type: web
    name: smart-greenhouse-backend
    env: python
    plan: free
    rootDir: server/dashboard
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate --noinput
      gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,smart-greenhouse-backend.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "https://smart-greenhouse-backend.onrender.com,https://smart-greenhouse-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://smart-greenhouse-backend.onrender.com,https://smart-greenhouse-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: greenhouse-db
          property: connectionString
      # MQTT Configuration
      - key: MQTT_WORKER_IN_PROCESS
        value: "true"
      - key: MQTT_ENABLED
        value: "true"
      - key: MQTT_BROKER
        value: "your-broker-url.hivemq.cloud"  # ← REPLACE with your broker URL
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_USE_TLS
        value: "false"
      - key: MQTT_USERNAME
        value: "yan9htun"  # ← REPLACE with your username
      - key: MQTT_PASSWORD
        value: "yan9htun"  # ← REPLACE with your password
      - key: MQTT_KEEPALIVE
        value: "60"
      - key: MQTT_CLIENT_ID_PREFIX
        value: "render-backend"
      - key: SERVER_SCHEDULE_DISPATCH
        value: "false"
      - key: CONN_MAX_AGE
        value: "600"
      - key: DISABLE_COLLECTSTATIC
        value: "0"

databases:
  - type: psql
    name: greenhouse-db
    plan: free
    ipAllowList: []
    databaseName: greenhouse
    user: greenhouse_user